name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run lint
      run: npm run lint

    - name: Run tests
      run: npm test

    - name: Build Next.js project
      run: npm run build

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: false
        load: true
        tags: levelupreads:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Run Docker container
      run: |
        docker run -d --name levelupreads-test -p 3000:3000 levelupreads:latest
        sleep 10
        curl -f http://localhost:3000 || exit 1
        curl -f http://localhost:3000/api/health || exit 1
        docker stop levelupreads-test
        docker rm levelupreads-test

    - name: Deploy to Render
      run: |
        if [ -n "$RENDER_DEPLOY_HOOK_URL" ]; then
          curl -X POST $RENDER_DEPLOY_HOOK_URL
        else
          echo "RENDER_DEPLOY_HOOK_URL not set, skipping deployment"
        fi
      env:
        RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
